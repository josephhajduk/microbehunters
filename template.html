<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Microbe Hunters — An Illustrated Reading</title>
<style>
/* ========================================
   CSS Custom Properties
   ======================================== */
:root {
  --text-width: 42rem;
  --media-width: 40vw;
  --gap: 2rem;
  --font-body: 'Literata', 'Georgia', serif;
  --font-heading: 'Inter', 'Helvetica Neue', sans-serif;
  --color-bg: #faf8f4;
  --color-text: #2c2420;
  --color-text-muted: #6b5e54;
  --color-accent: #8b6d5c;
  --color-rule: #d4cbc2;
  --color-media-bg: #f0ece6;
  --transition-duration: 0.6s;
  --reading-line-height: 1.85;
  --reading-font-size: 1.125rem;
}

/* ========================================
   Reset & Base
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: var(--reading-font-size);
  line-height: var(--reading-line-height);
}

/* ========================================
   Fonts — loaded from Google Fonts
   ======================================== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;1,7..72,400&display=swap');

/* ========================================
   Layout: Two columns
   ======================================== */
.page-wrapper {
  display: flex;
  min-height: 100vh;
}

/* Left column: scrolling text */
.text-column {
  flex: 1;
  min-width: 0;
  padding: 2rem clamp(2rem, 5vw, 6rem) 50vh clamp(2rem, 5vw, 6rem);
}

/* Right column: sticky media */
.media-column {
  position: sticky;
  top: 0;
  width: var(--media-width);
  height: 100vh;
  flex-shrink: 0;
  background: var(--color-media-bg);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ========================================
   Chapter Navigation (left sidebar)
   ======================================== */
.chapter-nav {
  position: fixed;
  top: 1rem;
  bottom: 1rem;
  left: 1rem;
  z-index: 100;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.25rem;
}

.nav-chapter {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.25rem 0.5rem;
  text-decoration: none;
  color: var(--color-text-muted);
  font-family: var(--font-heading);
  font-size: 0.7rem;
  border-radius: 4px;
  transition: opacity 0.2s, background 0.2s, color 0.2s, box-shadow 0.2s;
  opacity: 0.5;
}

.nav-chapter.active {
  opacity: 1;
  color: var(--color-accent);
}

.nav-chapter:hover {
  opacity: 1;
  background: rgba(139, 109, 92, 0.15);
  color: var(--color-accent);
  box-shadow: 0 0 0 4px var(--color-bg);
}

.nav-roman {
  font-weight: 600;
  min-width: 1.5em;
}

.nav-scientist {
  display: none;
}

.nav-chapter:hover .nav-scientist {
  display: inline;
}

/* Text size controls */
.text-size-controls {
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--color-rule);
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.text-size-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 0.25rem 0.5rem;
  font-family: var(--font-heading);
  color: var(--color-text-muted);
  cursor: pointer;
  text-align: left;
  font-size: 0.7rem;
  opacity: 0.6;
  transition: opacity 0.2s, background 0.2s, color 0.2s, border-color 0.2s;
}

.text-size-btn:hover {
  opacity: 1;
  background: rgba(139, 109, 92, 0.1);
}

.text-size-btn.active {
  opacity: 1;
  color: var(--color-accent);
  border-color: var(--color-accent);
}

/* Isolate controls from chapter hover effects */
.text-size-controls {
  pointer-events: auto;
}

.text-size-controls .text-size-btn {
  color: var(--color-text-muted);
}

.text-size-controls .text-size-btn.active {
  color: var(--color-accent);
}

/* Size classes on body */
body.text-size-default { --reading-font-size: 1.125rem; }
body.text-size-bigger  { --reading-font-size: 1.35rem; }
body.text-size-biggest { --reading-font-size: 1.65rem; }

/* Line spacing classes on body */
body.line-spacing-compact { --reading-line-height: 1.6; }
body.line-spacing-default { --reading-line-height: 1.85; }
body.line-spacing-relaxed { --reading-line-height: 2.15; }

/* ========================================
   Chapter Headers
   ======================================== */
.chapter-header {
  padding: 4rem 0 2rem;
  text-align: left;
  border-top: 1px solid var(--color-rule);
  margin-top: 3rem;
}

.chapter-header:first-child {
  border-top: none;
  margin-top: 0;
  padding-top: 6rem;
}

.chapter-number {
  font-family: var(--font-heading);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--color-text-muted);
  margin-bottom: 0.5rem;
}

.chapter-scientist {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 0.25rem;
  line-height: 1.2;
}

.chapter-subtitle {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--color-text-muted);
}

/* ========================================
   Sections & Segments
   ======================================== */
.section {
  margin-bottom: 1rem;
}

.segment {
  padding: 1.5rem 0;
  min-height: 40vh;
}

.segment-text p {
  margin-bottom: 1em;
  text-indent: 1.5em;
  hanging-punctuation: first;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}

.segment-text p:first-child {
  text-indent: 0;
}

/* Pretext-rendered lines */
.segment-text .pretext-paragraph {
  margin-bottom: 1em;
}

.segment-text .pretext-paragraph:first-child {
  /* no indent on first para */
}

.segment-text .pretext-paragraph:not(:first-child) {
  text-indent: 1.5em;
}

.segment-text .pretext-line {
  display: block;
  text-align: justify;
}

.segment-text .pretext-line:last-child {
  text-align: left;
}


/* ========================================
   Media Panel
   ======================================== */
.media-container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.media-item {
  position: absolute;
  inset: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--transition-duration) ease,
              transform var(--transition-duration) ease;
  pointer-events: none;
}

.media-item.active {
  opacity: 1;
  transform: none;
  pointer-events: auto;
}

.media-item img,
.media-item video {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
}

/* Placeholder when no media exists yet */
.media-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  color: var(--color-text-muted);
  font-family: var(--font-heading);
  font-size: 0.85rem;
  gap: 0.75rem;
}

.media-placeholder .mood-badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Mood colors */
.mood-badge[data-mood="wonder"]    { background: #e8dff0; color: #6b4d8a; }
.mood-badge[data-mood="discovery"] { background: #dce8d8; color: #4a6b42; }
.mood-badge[data-mood="tension"]   { background: #f0ddd8; color: #8a4d42; }
.mood-badge[data-mood="humor"]     { background: #f0ecd8; color: #7a6b2e; }
.mood-badge[data-mood="triumph"]   { background: #d8e4f0; color: #2e4d7a; }
.mood-badge[data-mood="sadness"]   { background: #e0dce0; color: #5a525a; }
.mood-badge[data-mood="curiosity"] { background: #dce8e8; color: #2e5a5a; }
.mood-badge[data-mood="adventure"] { background: #f0e4d8; color: #7a5a2e; }

/* ========================================
   Transition Variants
   ======================================== */
/* Fade (default) */
.media-item[data-transition="fade"] {
  /* Default opacity transition already handles this */
}

/* Slide up */
.media-item[data-transition="slide-up"] {
  transform: translateY(2rem);
}
.media-item[data-transition="slide-up"].active {
  transform: translateY(0);
}

/* Slide down */
.media-item[data-transition="slide-down"] {
  transform: translateY(-2rem);
}
.media-item[data-transition="slide-down"].active {
  transform: translateY(0);
}

/* Slide left */
.media-item[data-transition="slide-left"] {
  transform: translateX(2rem);
}
.media-item[data-transition="slide-left"].active {
  transform: translateX(0);
}

/* Dissolve (slower fade) */
.media-item[data-transition="dissolve"] {
  transition-duration: 1.2s;
}

/* Zoom */
.media-item[data-transition="zoom"] {
  transform: scale(0.92);
}
.media-item[data-transition="zoom"].active {
  transform: scale(1);
}

/* Crossfade (handled via JS timing) */
.media-item[data-transition="crossfade"] {
  transition-duration: 0.8s;
}

/* ========================================
   Title / Hero
   ======================================== */
.hero {
  padding: 8rem 0 4rem;
  text-align: left;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: 3rem;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 0.5rem;
}

.hero .author {
  font-size: 1.1rem;
  color: var(--color-text-muted);
  font-style: italic;
}

.hero .edition-note {
  font-family: var(--font-heading);
  font-size: 0.8rem;
  color: var(--color-accent);
  margin-top: 1rem;
  padding: 0.5rem 0;
  border-top: 1px solid var(--color-rule);
}

/* ========================================
   Responsive
   ======================================== */
@media (max-width: 1024px) {
  .chapter-nav { display: none; }
  .media-column {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 35vh;
    z-index: 50;
  }
  .text-column {
    max-width: 100%;
    padding: 2rem 1.5rem calc(35vh + 2rem) 1.5rem;
    margin: 0;
  }
  .page-wrapper {
    flex-direction: column;
  }
}

/* ========================================
   Scrollbar
   ======================================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--color-rule);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--color-accent);
}

/* ========================================
   Print
   ======================================== */
@media print {
  .media-column, .chapter-nav { display: none; }
  .text-column { max-width: 100%; padding: 0; margin: 0; }
  .segment { min-height: auto; }
}
</style>

<script>
function updateURL() {
  const seg = window._activeSegmentId || '';
  const size = document.body.className.match(/text-size-(\w+)/)?.[1] || 'default';
  const spacing = document.body.className.match(/line-spacing-(\w+)/)?.[1] || 'default';
  const hash = seg ? `#${seg}` : '';
  const params = new URLSearchParams();
  if (size !== 'default') params.set('size', size);
  if (spacing !== 'default') params.set('spacing', spacing);
  const qs = params.toString();
  const url = qs ? `?${qs}${hash}` : hash || '.';
  history.replaceState(null, '', url);
}

function setTextSize(size) {
  document.body.classList.remove('text-size-default', 'text-size-bigger', 'text-size-biggest');
  document.body.classList.add('text-size-' + size);
  document.querySelectorAll('[data-group="size"]').forEach(b => {
    b.classList.toggle('active', b.dataset.val === size);
  });
  updateURL();
  if (window._pretextReflow) window._pretextReflow();
}

function setLineSpacing(spacing) {
  document.body.classList.remove('line-spacing-compact', 'line-spacing-default', 'line-spacing-relaxed');
  document.body.classList.add('line-spacing-' + spacing);
  document.querySelectorAll('[data-group="spacing"]').forEach(b => {
    b.classList.toggle('active', b.dataset.val === spacing);
  });
  updateURL();
  if (window._pretextReflow) window._pretextReflow();
}

// Restore settings from URL on page load
(function restoreFromURL() {
  const params = new URLSearchParams(location.search);
  const size = params.get('size');
  const spacing = params.get('spacing');
  if (size && ['bigger', 'biggest'].includes(size)) setTextSize(size);
  if (spacing && ['compact', 'relaxed'].includes(spacing)) setLineSpacing(spacing);
})();
</script>

<script type="module">
// ============================================
// Pretext — text layout + scroll sync
// ============================================
import {
  prepareWithSegments,
  layoutWithLines,
  measureNaturalWidth,
  prepare,
  layout,
} from './node_modules/@chenglou/pretext/dist/layout.js';

// ============================================
// Configuration
// ============================================
const SCROLL_TRIGGER = 0.35;  // fraction from top of viewport
const WIDOW_THRESHOLD = 0.35; // last line < 35% of container = widow

// ============================================
// State
// ============================================
let activeSegmentId = null;
let segments = [];           // DOM elements
let segmentTops = [];        // Y offsets from pretext measurements
let mediaElements = {};
let ticking = false;

// ============================================
// Boot
// ============================================
function init() {
  segments = Array.from(document.querySelectorAll('.segment'));
  buildMediaPanel();
  reflowWithPretext();
  if (segments.length > 0) activateSegment(segments[0].dataset.media);

  // Scroll sync via rAF — driven by pretext measurements
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', () => {
    reflowWithPretext();
    syncFromScroll();
  });

  // Expose reflow for text size controls
  window._pretextReflow = () => {
    reflowWithPretext();
    syncFromScroll();
  };

  // Restore scroll position from URL hash
  const hash = location.hash.replace('#', '');
  if (hash) {
    const target = document.getElementById(hash);
    if (target) {
      target.scrollIntoView({ block: 'center' });
      activateSegment(hash);
    }
  }
}

// ============================================
// Pretext: reflow paragraphs + measure
// ============================================
function reflowWithPretext() {
  const style = getComputedStyle(document.body);
  const fontSize = parseFloat(style.fontSize);
  const lineHeight = fontSize * parseFloat(style.lineHeight) || fontSize * 1.85;
  const fontFamily = style.fontFamily.split(',')[0].trim().replace(/['"]/g, '');
  const font = `${fontSize}px ${fontFamily}`;
  const indentFont = font; // same font for indent measurement

  let totalLines = 0;
  let widowsFixed = 0;

  segments.forEach(seg => {
    const textEl = seg.querySelector('.segment-text');
    if (!textEl) return;

    const paragraphs = textEl.querySelectorAll('p');
    const containerWidth = textEl.offsetWidth;
    if (containerWidth <= 0) return;

    paragraphs.forEach((p, pIdx) => {
      const rawText = p.textContent || '';
      if (!rawText.trim()) return;

      try {
        const prepared = prepareWithSegments(rawText, font);
        const result = layoutWithLines(prepared, containerWidth, lineHeight);

        totalLines += result.lineCount;

        // Detect widows: last line < WIDOW_THRESHOLD of container width
        // Fix by adding a word-joiner before the last word
        if (result.lines.length >= 3) {
          const lastLine = result.lines[result.lines.length - 1];
          if (lastLine.width / containerWidth < WIDOW_THRESHOLD) {
            // Insert &nbsp; between last two words to pull one down
            const text = p.innerHTML;
            const lastSpaceIdx = text.lastIndexOf(' ', text.length - 2);
            if (lastSpaceIdx > 0) {
              const secondLastSpaceIdx = text.lastIndexOf(' ', lastSpaceIdx - 1);
              if (secondLastSpaceIdx > 0) {
                p.innerHTML = text.slice(0, secondLastSpaceIdx) + '\u00A0' + text.slice(secondLastSpaceIdx + 1);
                widowsFixed++;
              }
            }
          }
        }
      } catch (e) {
        // Graceful fallback — browser handles layout
      }
    });
  });

  // Now measure segment positions for scroll sync
  buildSegmentMap();

  console.log(`[pretext] ${segments.length} segments, ${totalLines} lines, ${widowsFixed} widows fixed`);
}

// ============================================
// Build scroll-sync position map
// ============================================
function buildSegmentMap() {
  segmentTops = segments.map(seg => {
    const rect = seg.getBoundingClientRect();
    return rect.top + window.scrollY;
  });
}

// ============================================
// Scroll sync — pretext-driven positions
// ============================================
function onScroll() {
  if (!ticking) {
    ticking = true;
    requestAnimationFrame(() => {
      syncFromScroll();
      ticking = false;
    });
  }
}

function syncFromScroll() {
  const triggerY = window.scrollY + window.innerHeight * SCROLL_TRIGGER;

  // Binary search for the segment whose top is closest below triggerY
  let lo = 0, hi = segmentTops.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (segmentTops[mid] <= triggerY) lo = mid;
    else hi = mid - 1;
  }

  const mediaId = segments[lo]?.dataset.media;
  if (mediaId && mediaId !== activeSegmentId) {
    activateSegment(mediaId);
  }
}

// ============================================
// Media panel
// ============================================
function buildMediaPanel() {
  const container = document.getElementById('media-container');

  segments.forEach(seg => {
    const mediaId = seg.dataset.media;
    const transition = seg.dataset.transition || 'fade';
    const mood = seg.dataset.mood || 'curiosity';

    const el = document.createElement('div');
    el.className = 'media-item';
    el.id = `media-${mediaId}`;
    el.dataset.transition = transition;
    el.innerHTML = mediaHTML(mediaId, mood);
    container.appendChild(el);
    mediaElements[mediaId] = el;
  });
}

function mediaHTML(mediaId, mood) {
  return `
    <video src="media/${mediaId}.mp4" autoplay loop muted playsinline
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
    </video>
    <img src="media/${mediaId}.png" alt=""
         style="display:none"
         onload="this.style.display='block'"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
    <div class="media-placeholder" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="mood-badge" data-mood="${mood}">${mood}</span>
      <span>${mediaId}</span>
    </div>`;
}

// ============================================
// Segment activation + transitions
// ============================================
function activateSegment(mediaId) {
  const prev = activeSegmentId;
  activeSegmentId = mediaId;
  window._activeSegmentId = mediaId;
  updateURL();

  if (prev && mediaElements[prev]) {
    mediaElements[prev].classList.remove('active');
    const v = mediaElements[prev].querySelector('video');
    if (v) v.pause();
  }

  if (mediaElements[mediaId]) {
    mediaElements[mediaId].classList.add('active');
    const v = mediaElements[mediaId].querySelector('video');
    if (v && v.readyState >= 2) { v.currentTime = 0; v.play().catch(() => {}); }
  }

  // Chapter nav
  const match = mediaId.match(/ch(\d+)/);
  if (match) {
    const ch = parseInt(match[1]);
    document.querySelectorAll('.nav-chapter').forEach((link, i) => {
      link.classList.toggle('active', i + 1 === ch);
    });
  }
}

// ============================================
// Keyboard navigation
// ============================================
document.addEventListener('keydown', (e) => {
  const idx = segments.findIndex(s => s.dataset.media === activeSegmentId);
  if ((e.key === 'ArrowDown' || e.key === 'j') && idx < segments.length - 1) {
    segments[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if ((e.key === 'ArrowUp' || e.key === 'k') && idx > 0) {
    segments[idx - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
});

// ============================================
// Go
// ============================================
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
